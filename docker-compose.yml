services:
  temporal:
    image: temporalio/temporal:1.7.0
    restart: on-failure
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --db-filename
      - /home/temporal/temporal.db
    ports:
      - "7233:7233"
      - "8233:8233"
    volumes:
      - temporal_data:/home/temporal
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "127.0.0.1:7233"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

volumes:
  temporal_data:

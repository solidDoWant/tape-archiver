---
config:
  # temporal selects the Temporal frontend the control worker connects to. address is required
  # and helm template fails when empty; namespace has a sensible default.
  #
  # Non-secret fields (address, namespace, tls.*, grpcMeta) are rendered into a temporal.toml
  # ConfigMap consumed by the Temporal Go SDK envconfig package (via TEMPORAL_CONFIG_FILE).
  # Secret material (apiKey, TLS cert/key/CA bytes) comes from k8s Secrets, surfaced as either
  # env vars or mounted files. The task queue is NOT configurable here: the worker derives it
  # from ROLE=control (SPEC §4.1), which the chart sets unconditionally.
  temporal:
    # address is the Temporal frontend host:port (no scheme). Written to address in the rendered
    # temporal.toml. Example: "temporal-frontend.temporal.svc.cluster.local:7233".
    address: ""
    # namespace is the Temporal namespace the workflows execute in. Written to namespace in the
    # rendered temporal.toml. Defaults to Temporal's built-in "default" namespace.
    namespace: "default"
    # apiKey is the Temporal Cloud / authenticated frontend API key. Sets TEMPORAL_API_KEY on
    # the control worker. Use secretKeyRef in production; value is intended for dev only.
    # Setting both is rejected. When both name and key under secretKeyRef are empty, no API key
    # env var is set.
    #
    # File-mounted keys: a value of the form "file:///absolute/path" tells the binary to read
    # the API key from disk on every Temporal RPC, picking up external rotators (Vault Agent,
    # external-secrets refresh, etc.) without a process restart. To use this, mount the backing
    # Secret yourself via resources.controllers.main.persistence and set apiKey.value to the
    # resulting in-container path with the file:// prefix. The path must be absolute.
    apiKey:
      value: ""
      secretKeyRef:
        name: ""
        key: ""
    # tls configures transport security to the Temporal frontend. enabled: false uses plaintext
    # gRPC; this holds even when apiKey is set, so a dev frontend that accepts a token over
    # plaintext keeps working. enabled: true turns on server-side TLS; mTLS and a custom CA are
    # optional, configured via the cert references below. Each reference points at an existing
    # k8s Secret (e.g. one produced by cert-manager). References that share a Secret name share
    # one volume mount.
    tls:
      enabled: false
      # serverName overrides the SNI / cert-verification hostname (TEMPORAL_TLS_SERVER_NAME).
      # Useful when address is an IP or a service name that doesn't match the cert's SAN.
      serverName: ""
      # disableHostVerification skips server certificate hostname verification. Should only be
      # used in development against self-signed certs.
      disableHostVerification: false
      # clientCertificate enables mTLS by pointing at a kubernetes.io/tls Secret containing the
      # client cert and private key. The Secret must have the standard "tls.crt" and "tls.key"
      # keys (cert-manager and `kubectl create secret tls` produce these by default). Leave
      # secretName empty to skip mTLS.
      clientCertificate:
        secretName: ""
      # caCert overrides the trusted CA pool. Unlike clientCertificate this is a free-form
      # secretKeyRef because CA bundles aren't standardised on a single Secret layout, but key
      # defaults to "ca.crt" (the convention used by cert-manager and most k8s tooling) so
      # usually only secretKeyRef.name needs to be set. Leave name empty to use the system roots.
      caCert:
        secretKeyRef:
          name: ""
          key: "ca.crt"
    # grpcMeta is a map of gRPC metadata headers added to every Temporal RPC. Keys are passed
    # through verbatim (the Temporal SDK lowercases and hyphenates them at load time). Rendered
    # under [profile.default.grpc_meta] in temporal.toml.
    grpcMeta: {}
    # keda configures KEDA's own connection to the Temporal frontend, used by the per-release
    # TriggerAuthentication that backs the ScaledJob's Temporal trigger. It applies ONLY on the
    # opt-in scaledjob path (resources.controllers.main.type: scaledjob) and is ignored on the
    # default Deployment path. Credential and TLS posture are configured independently of the
    # worker's so KEDA can be granted a less-privileged, read-only credential (Temporal RBAC
    # scoped to DescribeTaskQueue) without ever being handed the worker's own API key. To share
    # material with the worker, point keda.apiKey.secretKeyRef / keda.tls.* at the same Secrets
    # used under config.temporal.apiKey / config.temporal.tls.
    #
    # When type: scaledjob is enabled, keda.apiKey must be populated (value or secretKeyRef) or
    # the chart fails at render time — without it the scaler cannot read the task-queue backlog
    # and would never spawn a Job. With the default Deployment, this entire block is unused.
    keda:
      # apiKey is the Temporal API key KEDA's scaler uses to query task-queue backlog. Setting
      # both value and secretKeyRef is rejected. value is intended for dev; production should use
      # secretKeyRef. When value is set, the chart materialises a Secret named
      # "<release>-keda-temporal-apikey" holding it and points the TriggerAuthentication at it.
      apiKey:
        value: ""
        secretKeyRef:
          name: ""
          key: ""
      # tls configures KEDA's transport security to the Temporal frontend. Mirrors the shape of
      # config.temporal.tls but is resolved independently so KEDA's TLS posture can differ from
      # the worker's. serverName / disableHostVerification become scaler-side trigger metadata;
      # clientCertificate / caCert become authParams on the KEDA-side TriggerAuthentication only.
      # Setting any reference while enabled is false is a render-time error.
      tls:
        enabled: false
        # serverName overrides the SNI / cert-verification hostname (KEDA metadata tlsServerName).
        serverName: ""
        # disableHostVerification skips server-cert hostname verification (KEDA metadata
        # unsafeSsl). Development / self-signed only.
        disableHostVerification: false
        # clientCertificate enables mTLS by pointing at a kubernetes.io/tls Secret with the
        # standard "tls.crt" / "tls.key" keys. Leave secretName empty to skip mTLS.
        clientCertificate:
          secretName: ""
        # caCert overrides the trusted CA pool. Free-form secretKeyRef because CA bundles do not
        # standardise on a single Secret layout; both name and key must be set together (this
        # surface validates the pair bidirectionally so a missed name never silently drops the CA
        # reference from KEDA's TriggerAuthentication). Leave name empty to use the system roots.
        caCert:
          secretKeyRef:
            name: ""
            key: ""

  controlWorker:
    # logLevel is passed verbatim to the worker's logging setup via LOG_LEVEL (empty → info).
    logLevel: info
    # discordFailureWebhookUrl is the Discord webhook the control worker posts run-failure
    # alerts to (SPEC §11), surfaced as DISCORD_FAILURE_WEBHOOK_URL. Leave empty to disable
    # failure alerting (the worker raises no error on absence). Use secretKeyRef to source the
    # URL from a k8s Secret; value is intended for dev only. Setting both is rejected.
    discordFailureWebhookUrl:
      value: ""
      secretKeyRef:
        name: ""
        key: ""
    # k8sDatasetParent is democratic-csi's datasetParentName, prepended to a relative CSI
    # snapshotHandle to rebuild the absolute ZFS snapshot path during k8s resolution
    # (SPEC §3). Surfaced as TAPE_K8S_DATASET_PARENT. Only needed when a run names k8s
    # sources; leave empty to treat handles as already absolute.
    k8sDatasetParent: ""
    # The worker always exposes /metrics on port 9090 regardless of this value. The toggle
    # controls whether a PodMonitor is created for cluster-side scraping. Leave false when
    # running without prometheus-operator CRDs installed.
    metrics:
      enabled: false

# resources follows the bjw-s app-template schema. Values here are deep-merged over the
# chart-computed controller, env vars, persistence, and podMonitor; user-supplied values take
# precedence.
#
# The chart generates a single Deployment controller named "main" (image, named health port
# 8080 and metrics port 9090, hardened securityContext, httpGet liveness (/healthz) and
# readiness (/readyz) probes on the health port, and a terminationGracePeriodSeconds covering
# the worker's SIGTERM drain). Override it by adding resources.controllers.main with the
# standard bjw-s controller schema (replicas, pod, containers.main, etc.).
resources:
  defaultPodOptions:
    # The control worker discovers ZFS snapshots by reading VolumeSnapshot resources
    # from the Kubernetes API via an in-cluster client (pkg/k8ssnap uses
    # rest.InClusterConfig), so its ServiceAccount token must be mounted. bjw-s
    # defaults this to false; snapshot discovery would fail without it. Binding the
    # RBAC the token needs (a Role/ClusterRole for VolumeSnapshots) is the operator's
    # responsibility — see docs/control-worker-helm.md.
    automountServiceAccountToken: true
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
  controllers:
    # Override the chart-generated Deployment here. For example, to pin an image
    # tag or scale replicas:
    #   main:
    #     replicas: 2
    #     containers:
    #       main:
    #         image:
    #           repository: ghcr.io/soliddowant/tape-archiver/control-worker
    #           tag: v1.2.3
    #
    # Set main.type: scaledjob to opt into KEDA scale-to-zero: the chart renders a
    # keda.sh/v1alpha1 ScaledJob (job template = the control worker with
    # WORKER_IDLE_EXIT_AFTER defaulted to 15m so the Job self-completes) plus a per-release
    # TriggerAuthentication, and NO Deployment. A control-queue backlog scales the worker
    # 0 -> 1; it drains and exits after the idle window, scaling back to 0. This requires a
    # separate KEDA credential under config.temporal.keda.* and KEDA >= 2.16 / Temporal
    # server >= 1.24 in the cluster. The default (type absent) stays the fixed-replica
    # Deployment; the default render is byte-identical to before this option existed.
    #
    # KEDA-level knobs live under main.keda.* (pollingInterval, maxReplicaCount [default 1],
    # successfulJobsHistoryLimit, failedJobsHistoryLimit, scalingStrategy, targetQueueSize
    # [default 5], activationTargetQueueSize [default 0]); Job-template knobs under main.job.*
    # (backoffLimit, ttlSecondsAfterFinished, parallelism, completions, activeDeadlineSeconds).
    #   main:
    #     type: scaledjob
    #     keda:
    #       pollingInterval: 30
    #     job:
    #       ttlSecondsAfterFinished: 600
    main: {}

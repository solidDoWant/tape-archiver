---
{{/* ============================================================ */}}
{{/* Hard-coded chart internals (not exposed in values)           */}}
{{/* ============================================================ */}}
{{- $temporalConfigDir  := "/etc/temporal" -}}
{{- $temporalTLSRoot    := "/etc/temporal-tls" -}}
{{- $temporalConfigFile := printf "%s/temporal.toml" $temporalConfigDir -}}

{{/* The single controller and its container are both named "main" so operator
   overrides have a stable path (resources.controllers.main.containers.main.*). */}}
{{- $controllerName := "main" -}}
{{- $containerName  := "main" -}}

{{/* The default control-worker image. Repository is the Makefile's published
   image name (ghcr.io/soliddowant/tape-archiver/control-worker); tag defaults to
   the chart appVersion and is re-resolved post-merge so a user override wins. */}}
{{- $defaultImageRepository := "ghcr.io/soliddowant/tape-archiver/control-worker" -}}

{{/* ============================================================ */}}
{{/* Temporal connection values                                    */}}
{{/* ============================================================ */}}
{{- $temporalAddress   := .Values.config.temporal.address   | default "" -}}
{{- $temporalNamespace := .Values.config.temporal.namespace | default "" -}}
{{- if not $temporalAddress -}}
  {{- fail "config.temporal.address is required (host:port of the Temporal frontend)" -}}
{{- end -}}
{{- if not $temporalNamespace -}}
  {{- fail "config.temporal.namespace must not be empty (chart default is \"default\")" -}}
{{- end -}}

{{/* ============================================================ */}}
{{/* Credential secretKeyRef validation                           */}}
{{/* ============================================================ */}}
{{- $temporalAPIKeyValue      := .Values.config.temporal.apiKey.value             | default "" -}}
{{- $temporalAPIKeySecretName := .Values.config.temporal.apiKey.secretKeyRef.name | default "" -}}
{{- $temporalAPIKeySecretKey  := .Values.config.temporal.apiKey.secretKeyRef.key  | default "" -}}
{{- if or (and $temporalAPIKeySecretName (not $temporalAPIKeySecretKey)) (and $temporalAPIKeySecretKey (not $temporalAPIKeySecretName)) -}}
  {{- fail "config.temporal.apiKey.secretKeyRef.name and config.temporal.apiKey.secretKeyRef.key must both be set when using secretKeyRef" -}}
{{- end -}}
{{- if and $temporalAPIKeyValue $temporalAPIKeySecretName -}}
  {{- fail "config.temporal.apiKey.value and config.temporal.apiKey.secretKeyRef are mutually exclusive — set only one" -}}
{{- end -}}

{{- $webhookValue     := .Values.config.controlWorker.discordFailureWebhookUrl.value             | default "" -}}
{{- $webhookSecretName := .Values.config.controlWorker.discordFailureWebhookUrl.secretKeyRef.name | default "" -}}
{{- $webhookSecretKey  := .Values.config.controlWorker.discordFailureWebhookUrl.secretKeyRef.key  | default "" -}}
{{- if or (and $webhookSecretName (not $webhookSecretKey)) (and $webhookSecretKey (not $webhookSecretName)) -}}
  {{- fail "config.controlWorker.discordFailureWebhookUrl.secretKeyRef.name and .key must both be set when using secretKeyRef" -}}
{{- end -}}
{{- if and $webhookValue $webhookSecretName -}}
  {{- fail "config.controlWorker.discordFailureWebhookUrl.value and .secretKeyRef are mutually exclusive — set only one" -}}
{{- end -}}

{{/* ============================================================ */}}
{{/* Temporal TLS cert reference resolution                       */}}
{{/* ============================================================ */}}
{{/*
For each present cert reference, compute the file path the chart will mount it at
(<tls-root>/<secret>/<key>) and track unique Secret names so the chart can dedupe
volume mounts. References are only honoured when tls.enabled=true; setting one
otherwise is a config error so a forgotten enabled flag doesn't silently disable
mTLS or CA verification.
*/}}
{{- $temporalTLSEnabled := .Values.config.temporal.tls.enabled -}}
{{- $tlsResolvedPaths := dict -}}
{{- $tlsSecretMounts  := dict -}}

{{- $clientCertSecretName := .Values.config.temporal.tls.clientCertificate.secretName | default "" -}}
{{- if $clientCertSecretName -}}
  {{- if not $temporalTLSEnabled -}}
    {{- fail "config.temporal.tls.clientCertificate.secretName is set but config.temporal.tls.enabled is false — enable TLS or remove the reference" -}}
  {{- end -}}
  {{- $mountDir := printf "%s/%s" $temporalTLSRoot $clientCertSecretName -}}
  {{- $_ := set $tlsResolvedPaths "clientCert" (printf "%s/tls.crt" $mountDir) -}}
  {{- $_ := set $tlsResolvedPaths "clientKey" (printf "%s/tls.key" $mountDir) -}}
  {{- $_ := set $tlsSecretMounts $clientCertSecretName $mountDir -}}
{{- end -}}

{{- $caCertRef := .Values.config.temporal.tls.caCert.secretKeyRef | default dict -}}
{{- $caCertSecretName := $caCertRef.name | default "" -}}
{{- $caCertSecretKey  := $caCertRef.key  | default "" -}}
{{- if $caCertSecretName -}}
  {{- if not $caCertSecretKey -}}
    {{- fail "config.temporal.tls.caCert.secretKeyRef.key must not be empty when name is set (chart default is \"ca.crt\")" -}}
  {{- end -}}
  {{- if not $temporalTLSEnabled -}}
    {{- fail "config.temporal.tls.caCert.secretKeyRef is set but config.temporal.tls.enabled is false — enable TLS or remove the reference" -}}
  {{- end -}}
  {{- $mountDir := printf "%s/%s" $temporalTLSRoot $caCertSecretName -}}
  {{- $_ := set $tlsResolvedPaths "caCert" (printf "%s/%s" $mountDir $caCertSecretKey) -}}
  {{- $_ := set $tlsSecretMounts $caCertSecretName $mountDir -}}
{{- end -}}

{{/* ============================================================ */}}
{{/* Controller type: Deployment (default) vs KEDA ScaledJob       */}}
{{/* ============================================================ */}}
{{/* resources.controllers.main.type selects the deployment shape. Absent or any
   non-"scaledjob" value keeps the historical fixed-replica Deployment path
   untouched (byte-identical default render). "scaledjob" opts in to a
   keda.sh/v1alpha1 ScaledJob that scales the worker to zero between runs and a
   control-queue backlog scales it back to 1 (SPEC §4.1; parent #113). */}}
{{- $userTypeControllers := index .Values.resources "controllers" | default dict -}}
{{- $userTypeMain := index $userTypeControllers $controllerName | default dict -}}
{{- $userMainType := index $userTypeMain "type" | default "deployment" -}}
{{- $isScaledJob := eq $userMainType "scaledjob" -}}

{{/* ============================================================ */}}
{{/* KEDA (ScaledJob) credential + TLS reference resolution        */}}
{{/* ============================================================ */}}
{{/* config.temporal.keda.* is a separate, least-privilege Temporal credential
   used only by KEDA's scaler (read-only DescribeTaskQueue), distinct from the
   worker's own config.temporal.apiKey / tls.*. It is resolved into a per-release
   TriggerAuthentication only on the scaledjob path; the same value/secretKeyRef
   and TLS secretName shapes are reused so operators configure KEDA exactly like
   the worker. */}}
{{- $keda := index .Values.config.temporal "keda" | default dict -}}
{{- $kedaAPIKeyValue      := dig "apiKey" "value"             "" $keda -}}
{{- $kedaAPIKeySecretName := dig "apiKey" "secretKeyRef" "name" "" $keda -}}
{{- $kedaAPIKeySecretKey  := dig "apiKey" "secretKeyRef" "key"  "" $keda -}}
{{- if or (and $kedaAPIKeySecretName (not $kedaAPIKeySecretKey)) (and $kedaAPIKeySecretKey (not $kedaAPIKeySecretName)) -}}
  {{- fail "config.temporal.keda.apiKey.secretKeyRef.name and config.temporal.keda.apiKey.secretKeyRef.key must both be set when using secretKeyRef" -}}
{{- end -}}
{{- if and $kedaAPIKeyValue $kedaAPIKeySecretName -}}
  {{- fail "config.temporal.keda.apiKey.value and config.temporal.keda.apiKey.secretKeyRef are mutually exclusive — set only one" -}}
{{- end -}}

{{/* KEDA TLS: mirrors the worker's tls resolution but is configured independently
   so KEDA's transport posture can differ from the worker's. serverName /
   disableHostVerification are scaler-side metadata (tlsServerName / unsafeSsl);
   cert/key/CA references become authParams on the TriggerAuthentication. Setting
   any keda.tls.* reference while keda.tls.enabled is false is a config error, so a
   forgotten enabled flag never silently drops KEDA's mTLS or CA verification. */}}
{{- $kedaTLSEnabled := dig "tls" "enabled" false $keda -}}
{{- $kedaTLSServerName := dig "tls" "serverName" "" $keda -}}
{{- $kedaTLSDisableHostVerification := dig "tls" "disableHostVerification" false $keda -}}
{{- if and (not $kedaTLSEnabled) $kedaTLSServerName -}}
  {{- fail "config.temporal.keda.tls.serverName is set but config.temporal.keda.tls.enabled is false — enable TLS or remove the override" -}}
{{- end -}}
{{- if and (not $kedaTLSEnabled) $kedaTLSDisableHostVerification -}}
  {{- fail "config.temporal.keda.tls.disableHostVerification is set but config.temporal.keda.tls.enabled is false — enable TLS or remove the override" -}}
{{- end -}}
{{- $kedaTLSEntries := list -}}
{{- $kedaClientCertSecret := dig "tls" "clientCertificate" "secretName" "" $keda -}}
{{- if $kedaClientCertSecret -}}
  {{- if not $kedaTLSEnabled -}}
    {{- fail "config.temporal.keda.tls.clientCertificate.secretName is set but config.temporal.keda.tls.enabled is false — enable TLS or remove the reference" -}}
  {{- end -}}
  {{- $kedaTLSEntries = append $kedaTLSEntries (dict "parameter" "cert" "name" $kedaClientCertSecret "key" "tls.crt") -}}
  {{- $kedaTLSEntries = append $kedaTLSEntries (dict "parameter" "key"  "name" $kedaClientCertSecret "key" "tls.key") -}}
{{- end -}}
{{- $kedaCACertSecretName := dig "tls" "caCert" "secretKeyRef" "name" "" $keda -}}
{{- $kedaCACertSecretKey  := dig "tls" "caCert" "secretKeyRef" "key"  "" $keda -}}
{{- if or (and $kedaCACertSecretName (not $kedaCACertSecretKey)) (and $kedaCACertSecretKey (not $kedaCACertSecretName)) -}}
  {{- fail "config.temporal.keda.tls.caCert.secretKeyRef.name and config.temporal.keda.tls.caCert.secretKeyRef.key must both be set when using secretKeyRef" -}}
{{- end -}}
{{- if $kedaCACertSecretName -}}
  {{- if not $kedaTLSEnabled -}}
    {{- fail "config.temporal.keda.tls.caCert.secretKeyRef is set but config.temporal.keda.tls.enabled is false — enable TLS or remove the reference" -}}
  {{- end -}}
  {{- $kedaTLSEntries = append $kedaTLSEntries (dict "parameter" "ca" "name" $kedaCACertSecretName "key" $kedaCACertSecretKey) -}}
{{- end -}}

{{/* The KEDA credential is optional. An authenticated Temporal frontend needs
   config.temporal.keda.apiKey (and any keda.tls.*); an unauthenticated, plaintext
   frontend needs neither and the scaler connects anonymously. This matters because
   KEDA's Temporal scaler forces a TLS connection whenever an API key is set, so a
   plaintext frontend must be configured with NO keda.apiKey — otherwise the scaler
   speaks TLS to a plaintext server and never reads the backlog. When neither an API
   key nor TLS material is configured the chart emits no TriggerAuthentication and the
   trigger carries no authenticationRef. */}}
{{- $kedaHasAPIKey := or $kedaAPIKeyValue $kedaAPIKeySecretName -}}
{{- $kedaNeedsAuth := or $kedaHasAPIKey (gt (len $kedaTLSEntries) 0) -}}

{{/* ============================================================ */}}
{{/* Control-worker env vars                                       */}}
{{/* ============================================================ */}}
{{- $env := dict -}}

{{/* ROLE selects the `control` task queue and activity set in cmd/worker
   (SPEC §4.1). It is fixed by this chart — a data worker is not deployed to
   Kubernetes. */}}
{{- $_ := set $env "ROLE" "control" -}}

{{/* Address, namespace, TLS, and grpc_meta come from the rendered temporal.toml
   pointed to by TEMPORAL_CONFIG_FILE. */}}
{{- $_ := set $env "TEMPORAL_CONFIG_FILE" $temporalConfigFile -}}

{{/* WORKER_IDLE_EXIT_AFTER (control role only): on the scaledjob path the worker must
   drain and exit after an idle window so its Job completes and KEDA can scale back to
   zero (SPEC §4.1). Defaults to 15m — the workflow-bearing default (issue #115); a
   backup run's tape-write window and operator pauses leave the control queue idle far
   longer, so a respawn-and-replay mid-run is expected, not exceptional. Operators
   override via resources.controllers.main.containers.main.env.WORKER_IDLE_EXIT_AFTER,
   which wins in the user-resources merge below. Unset on the Deployment path, where the
   worker runs until SIGTERM. */}}
{{- if $isScaledJob -}}
  {{- $_ := set $env "WORKER_IDLE_EXIT_AFTER" "15m" -}}
{{- end -}}

{{/* LOG_LEVEL */}}
{{- if .Values.config.controlWorker.logLevel -}}
  {{- $_ := set $env "LOG_LEVEL" .Values.config.controlWorker.logLevel -}}
{{- end -}}

{{/* TEMPORAL_API_KEY: env var (not TOML) so the SDK's env-over-file precedence
   keeps the secret out of the ConfigMap. */}}
{{- if $temporalAPIKeySecretName -}}
  {{- $_ := set $env "TEMPORAL_API_KEY" (dict "valueFrom" (dict "secretKeyRef" (dict "name" $temporalAPIKeySecretName "key" $temporalAPIKeySecretKey))) -}}
{{- else if $temporalAPIKeyValue -}}
  {{- $_ := set $env "TEMPORAL_API_KEY" $temporalAPIKeyValue -}}
{{- end -}}

{{/* DISCORD_FAILURE_WEBHOOK_URL (SPEC §11): value or Secret. */}}
{{- if $webhookSecretName -}}
  {{- $_ := set $env "DISCORD_FAILURE_WEBHOOK_URL" (dict "valueFrom" (dict "secretKeyRef" (dict "name" $webhookSecretName "key" $webhookSecretKey))) -}}
{{- else if $webhookValue -}}
  {{- $_ := set $env "DISCORD_FAILURE_WEBHOOK_URL" $webhookValue -}}
{{- end -}}

{{/* TAPE_K8S_DATASET_PARENT: only set when configured (SPEC §3). */}}
{{- if .Values.config.controlWorker.k8sDatasetParent -}}
  {{- $_ := set $env "TAPE_K8S_DATASET_PARENT" .Values.config.controlWorker.k8sDatasetParent -}}
{{- end -}}

{{/* ============================================================ */}}
{{/* Temporal client config: temporal.toml ConfigMap + TLS mounts */}}
{{/* ============================================================ */}}
{{/* Build the profile dict in camelCase, then snake-case its keys via the helper.
   Pruned: apiKey (sensitive — env var instead) and the Helm-only secretKeyRef
   wiring (replaced with resolved file paths). */}}
{{- $temporalProfile := dict
  "address"   $temporalAddress
  "namespace" $temporalNamespace
-}}
{{/* The [tls] table is always emitted. When enabled is false we set disabled=true
   explicitly, because the SDK auto-enables TLS when an API key is set and the TLS
   config is absent. Without the explicit disabled=true, `tls.enabled: false` +
   apiKey would silently speak TLS to a plaintext frontend. */}}
{{- $tls := dict -}}
{{- if $temporalTLSEnabled -}}
  {{- if .Values.config.temporal.tls.serverName -}}
    {{- $_ := set $tls "serverName" .Values.config.temporal.tls.serverName -}}
  {{- end -}}
  {{- if .Values.config.temporal.tls.disableHostVerification -}}
    {{- $_ := set $tls "disableHostVerification" true -}}
  {{- end -}}
  {{- if hasKey $tlsResolvedPaths "clientCert" -}}
    {{- $_ := set $tls "clientCertPath" (index $tlsResolvedPaths "clientCert") -}}
  {{- end -}}
  {{- if hasKey $tlsResolvedPaths "clientKey" -}}
    {{- $_ := set $tls "clientKeyPath" (index $tlsResolvedPaths "clientKey") -}}
  {{- end -}}
  {{- if hasKey $tlsResolvedPaths "caCert" -}}
    {{- $_ := set $tls "serverCaCertPath" (index $tlsResolvedPaths "caCert") -}}
  {{- end -}}
{{- else -}}
  {{- $_ := set $tls "disabled" true -}}
{{- end -}}
{{- $_ := set $temporalProfile "tls" $tls -}}

{{- $snakedProfile := include "tape-archiver-control-worker.snakeKeys" $temporalProfile | fromYaml -}}

{{/* Attach grpc_meta after recursion so user-supplied header keys are not snake-cased
   (the SDK normalises them on load). */}}
{{- $grpcMeta := .Values.config.temporal.grpcMeta | default dict -}}
{{- if $grpcMeta -}}
  {{- $_ := set $snakedProfile "grpc_meta" $grpcMeta -}}
{{- end -}}

{{- $temporalToml := dict "profile" (dict "default" $snakedProfile) | toToml -}}

{{- $computedConfigMaps := dict -}}
{{- $computedPersistence := dict -}}

{{- $_ := set $computedConfigMaps "temporal-config" (dict "data" (dict "temporal.toml" $temporalToml)) -}}
{{- $temporalConfigMount := dict "path" $temporalConfigDir "readOnly" true -}}
{{- $_ := set $computedPersistence "temporal-config" (dict
  "type" "configMap"
  "identifier" "temporal-config"
  "advancedMounts" (dict $controllerName (dict $containerName (list $temporalConfigMount)))
) -}}

{{/* TLS Secret mounts (one per unique Secret name), mounted RO on the worker.
   Each mount projects the entire Secret as a directory under <tls-root>/<secret>/;
   the TOML references individual keys by full file path. */}}
{{- range $secretName, $mountDir := $tlsSecretMounts -}}
  {{- $persistenceKey := printf "temporal-tls-%s" $secretName -}}
  {{- $tlsMount := dict "path" $mountDir "readOnly" true -}}
  {{- $_ := set $computedPersistence $persistenceKey (dict
    "type" "secret"
    "name" $secretName
    "advancedMounts" (dict $controllerName (dict $containerName (list $tlsMount)))
  ) -}}
{{- end -}}

{{/* ============================================================ */}}
{{/* Controller default (single "main" Deployment)                */}}
{{/* ============================================================ */}}
{{/* The worker serves HTTP health endpoints on the named health port: liveness
   (/healthz, 200 as soon as the process is serving) and readiness (/readyz, 200
   only while the Temporal connection is healthy, else 503) (SPEC §4.1). The
   probes are httpGet checks against that port — distinct from the /metrics port,
   so health stays meaningful even if metrics are disabled, and a worker that
   loses its Temporal connection is taken out of readiness without the pod being
   restarted. */}}
{{- $userControllers := index .Values.resources "controllers" | default dict -}}
{{- $userMain := index $userControllers $controllerName | default dict -}}
{{- $replicas := index $userMain "replicas" | default 1 -}}
{{- $livenessSpec := dict
  "httpGet" (dict "path" "/healthz" "port" "health")
  "initialDelaySeconds" 0
  "periodSeconds" 10
  "failureThreshold" 3
-}}
{{- $readinessSpec := dict
  "httpGet" (dict "path" "/readyz" "port" "health")
  "initialDelaySeconds" 0
  "periodSeconds" 10
  "failureThreshold" 3
-}}
{{- $controller := dict
  "strategy" "RollingUpdate"
  "containers" (dict $containerName (dict
    "image" (dict
      "repository" $defaultImageRepository
      "tag" $.Chart.AppVersion
    )
    "ports" (list
      (dict
        "name" "health"
        "containerPort" 8080
        "protocol" "TCP"
      )
      (dict
        "name" "metrics"
        "containerPort" 9090
        "protocol" "TCP"
      )
    )
    "probes" (dict
      "liveness" (dict "enabled" true "custom" true "spec" $livenessSpec)
      "readiness" (dict "enabled" true "custom" true "spec" $readinessSpec)
    )
    "securityContext" (dict
      "allowPrivilegeEscalation" false
      "capabilities" (dict "drop" (list "ALL"))
      "readOnlyRootFilesystem" true
      "runAsNonRoot" true
      "runAsUser" 1000
      "runAsGroup" 1000
    )
    "env" $env
  ))
  "pod" (dict
    "terminationGracePeriodSeconds" 60
  )
  "podDisruptionBudget" (dict "enabled" (gt ($replicas | int) 1) "minAvailable" 1)
-}}

{{/* ============================================================ */}}
{{/* PodMonitor (conditional)                                     */}}
{{/* ============================================================ */}}
{{/* The worker always exposes /metrics on :9090. config.controlWorker.metrics.enabled
   toggles whether a PodMonitor is emitted (requires prometheus-operator CRDs). */}}
{{- $computedPodMonitors := dict -}}
{{- $metricsEnabledTpl := printf "{{ .Values.config.controlWorker.metrics.enabled }}" -}}
{{- $_ := set $computedPodMonitors $controllerName (dict
  "enabled" $metricsEnabledTpl
  "suffix" $controllerName
  "selector" (dict
    "matchLabels" (dict
      "app.kubernetes.io/name" (printf "{{ include \"bjw-s.common.lib.chart.names.name\" $ }}")
      "app.kubernetes.io/instance" "{{ .Release.Name }}"
      "app.kubernetes.io/controller" $controllerName
    )
  )
  "podMetricsEndpoints" (list (dict
    "port" "metrics"
    "interval" "1m"
    "scrapeTimeout" "10s"
  ))
) -}}

{{/* ============================================================ */}}
{{/* Assemble computed additions + deep-merge user resources       */}}
{{/* ============================================================ */}}
{{- $computedAdditions := dict
  "controllers"  (dict $controllerName $controller)
  "persistence"  $computedPersistence
  "configMaps"   $computedConfigMaps
  "podMonitor"   $computedPodMonitors
-}}
{{- $mergedResources := mustMergeOverwrite $computedAdditions (mustDeepCopy .Values.resources) -}}

{{/* Resolve the image tag tpl string post-merge so a user override of
   containers.main.image.tag (which may reference {{ .Chart.AppVersion }}) wins. */}}
{{- $ctrl := index $mergedResources "controllers" $controllerName -}}
{{- $cnt := index (index $ctrl "containers" | default dict) $containerName -}}
{{- if $cnt -}}
  {{- $img := index $cnt "image" | default dict -}}
  {{- $rawTag := index $img "tag" | default "" | toString -}}
  {{- $_ := set $img "tag" (tpl $rawTag $ | default $.Chart.AppVersion) -}}
  {{- $_ := set $cnt "image" $img -}}
{{- end -}}

{{/* podDisruptionBudget: strip the enabled key when true (bjw-s renders it live),
   drop the whole block when false. */}}
{{- $pdb := index $ctrl "podDisruptionBudget" -}}
{{- if and $pdb (hasKey $pdb "enabled") -}}
  {{- if index $pdb "enabled" -}}
    {{- $_ := unset $pdb "enabled" -}}
  {{- else -}}
    {{- $_ := unset $ctrl "podDisruptionBudget" -}}
  {{- end -}}
{{- end -}}

{{/* podMonitor: convert the enabled tpl string to a bool for bjw-s. */}}
{{- range $obj := values (index $mergedResources "podMonitor" | default dict) -}}
  {{- if and (kindIs "map" $obj) (hasKey $obj "enabled") -}}
    {{- $_ := set $obj "enabled" (eq (tpl (get $obj "enabled" | toString) $) "true") -}}
  {{- end -}}
{{- end -}}

{{/* ============================================================ */}}
{{/* Inject into .Values; strip chart-specific keys               */}}
{{/* ============================================================ */}}
{{- $mergedValues := mustDeepCopy .Values -}}
{{- $mergedValues = omit $mergedValues "config" "resources" -}}
{{- $mergedValues = mustMergeOverwrite $mergedValues $mergedResources -}}
{{- $_ := set . "Values" $mergedValues -}}

{{/* Default global.nameOverride to the release name, matching upstream bjw-s
   app-template so the auto-created ServiceAccount name and the pod's SA reference
   agree for arbitrary release names. */}}
{{- if not (dig "global" "nameOverride" "" .Values) -}}
  {{- $existingGlobal := index .Values "global" | default dict -}}
  {{- $_ := set .Values "global" (mustMergeOverwrite (dict "nameOverride" .Release.Name) $existingGlobal) -}}
{{- end -}}

{{- if $isScaledJob -}}
{{/* ============================================================ */}}
{{/* ScaledJob path: render the KEDA resources ourselves, then     */}}
{{/* hand the rest (ConfigMap, ServiceAccount, PodMonitor) to      */}}
{{/* bjw-s with the "main" controller partitioned out.             */}}
{{/* ============================================================ */}}
{{/* Split init from generate so the scaledjob helper can reuse the post-init
   bjw-s helpers (fullname, metadata, pod.spec) without bjw-s' generate pass ever
   seeing a controller of type "scaledjob" — bjw-s has no such controller type and
   its validation would reject it. */}}
{{- include "bjw-s.common.loader.init" . -}}

{{- $fullName := include "bjw-s.common.lib.chart.names.fullname" . -}}

{{- $kedaTLS := dict -}}
{{- if $kedaTLSServerName -}}
  {{- $_ := set $kedaTLS "serverName" $kedaTLSServerName -}}
{{- end -}}
{{- if $kedaTLSDisableHostVerification -}}
  {{- $_ := set $kedaTLS "unsafeSsl" true -}}
{{- end -}}

{{/* Emit a TriggerAuthentication only when there is auth material to carry — an API
   key and/or TLS cert references. A plaintext, unauthenticated Temporal needs neither,
   so authRefName stays empty and the ScaledJob's trigger carries no authenticationRef.
   Resolve the Secret backing the KEDA API key when one is set: an operator-supplied
   Secret via secretKeyRef, or a chart-managed Secret carrying the inline value; left
   empty for TLS-only auth so the TriggerAuthentication carries only the TLS authParams. */}}
{{- $authRefName := "" -}}
{{- $kedaSecretName := "" -}}
{{- $kedaSecretKey := "" -}}
{{- if $kedaNeedsAuth -}}
{{- $authRefName = printf "%s-keda" $fullName -}}
{{- if $kedaAPIKeySecretName -}}
{{- $kedaSecretName = $kedaAPIKeySecretName -}}
{{- $kedaSecretKey = $kedaAPIKeySecretKey -}}
{{- else if $kedaAPIKeyValue -}}
{{- $kedaSecretName = printf "%s-keda-temporal-apikey" $fullName -}}
{{- $kedaSecretKey = "apiKey" -}}
{{- end -}}
{{- include "tape-archiver-control-worker.triggerAuthentication" (dict
  "rootContext" .
  "name" $authRefName
  "apiKeySecret" (dict "name" $kedaSecretName "key" $kedaSecretKey)
  "tlsSecrets" $kedaTLSEntries
) }}
{{- end -}}

{{/* Chart-managed Secret carrying the inline keda.apiKey.value (dev only). */}}
{{- if $kedaAPIKeyValue }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $kedaSecretName }}
  namespace: {{ .Release.Namespace }}
  labels: {{ include "bjw-s.common.lib.metadata.allLabels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $kedaSecretKey }}: {{ $kedaAPIKeyValue | quote }}
{{- end }}

{{/* Render the ScaledJob from the merged "main" controller (still present in
   .Values.controllers at this point, so pod.spec resolves its persistence mounts). */}}
{{- $scaledMainController := index (index .Values "controllers") $controllerName -}}
{{- include "tape-archiver-control-worker.scaledjob" (dict
  "rootContext" .
  "controllerName" $controllerName
  "controller" $scaledMainController
  "endpoint" $temporalAddress
  "namespace" $temporalNamespace
  "taskQueue" "control"
  "authRefName" $authRefName
  "kedaTLS" $kedaTLS
) }}

{{/* Strip the "main" controller and its advancedMounts references before bjw-s'
   generate pass: bjw-s must not render it (no scaledjob type) and its persistence
   validation fails on advancedMounts entries pointing at a now-absent controller.
   The ScaledJob above already consumed the pre-strip mount config. */}}
{{- $valuesControllers := index .Values "controllers" -}}
{{- $_ := unset $valuesControllers $controllerName -}}
{{- $valuesPersistence := index .Values "persistence" | default dict -}}
{{- range $persistenceValues := values $valuesPersistence -}}
  {{- $advancedMounts := index $persistenceValues "advancedMounts" | default dict -}}
  {{- $_ := unset $advancedMounts $controllerName -}}
{{- end -}}
{{/* Drop persistence items whose advancedMounts emptied out — with the sole
   controller stripped, bjw-s' volumes helper would otherwise fall back to mounting
   them at /<identifier>; harmless with zero controllers, but dropping them keeps the
   generate pass clean. The ConfigMap itself renders from .Values.configMaps. */}}
{{- range $persistenceKey, $persistenceValues := $valuesPersistence -}}
  {{- if hasKey $persistenceValues "advancedMounts" -}}
    {{- if empty (index $persistenceValues "advancedMounts") -}}
      {{- $_ := unset $valuesPersistence $persistenceKey -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- include "bjw-s.common.loader.generate" . }}
{{- else -}}
{{- include "bjw-s.common.loader.all" . }}
{{- end -}}
